              <ul>
<li>20岁的愿望到30岁只会变成遗憾，就像小学三年级缺的那顿烧烤再也补不回来一样。</li>
<li>人类都在被现实打击 觉得一切都没有意义 想去在黑暗里找到光。<br>
但是反过来想的话 如果自己被不停的打击不停的被黑暗吞噬 那不正说明自己是光么？</li>
<li>“年轻就是好啊”的前提是：你愿意趁着年轻多习，而不是以年轻为借口不断地与自己和解。</li>
<li>希望，总是在失望，甚至是绝望时产生的。</li>
</ul>
